# Déploie Newdesign-port (Next.js export statique) sur GitHub Pages (https://<user>.github.io/<nom-du-repo>/)
# Après le 1er push : Settings → Pages → Source = GitHub Actions (voir README si l’UI ne montre que des cartes).
name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@mylife/core
      - run: npm run build --workspace=@mylife/newdesign
        env:
          NEXT_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Newdesign-port/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
